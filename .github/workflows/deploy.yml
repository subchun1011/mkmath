name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # main 브랜치에 푸시될 때마다 작동

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./kids-game # 소스가 들어있는 폴더 지정
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 캐시 설정은 에러 방지를 위해 일단 제외하거나 유연하게 설정합니다.

      - name: Install dependencies
        run: npm install

      - name: Build
        # CI=false를 붙여서 단순 경고 때문에 빌드가 멈추는 것을 방지합니다. ⭐
        run: CI=false npm run build 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 빌드 결과물이 생성되는 폴더 (Vite 기본값은 dist입니다)
          path: ./kids-game/dist 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4